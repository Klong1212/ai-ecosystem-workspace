version: '3.8'

services:
  # -------------------------
  # ส่วนของ Redis
  # -------------------------
  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # ส่วนของ PostgreSQL
  # -------------------------
  db:
    image: postgres:15.4-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data  # แก้ไขการย่อหน้าให้ตรงกับ ports
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydatabase
# -------------------------
# ส่วนประกาศสร้าง Volumes 
# -------------------------
volumes:
  redis-data:       # สร้างฮาร์ดดิสก์จำลองให้ Redis
  postgresql-data:    # สร้างฮาร์ดดิสก์จำลองให้ PostgreSQL